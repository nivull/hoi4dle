<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOI4dle</title>
    <link rel="stylesheet" href="stylesheets\country.css">
    <script src="scripts\search.js" defer></script>
    <script src="scripts\country-game.js" defer></script>
</head>

</head>
<body>


    <div class="wrapper">

        <h1 class="titlebox" onclick="location.href='index.html'">HOI4dle</h1>
        <h2 id="subtitle" >Guess the Country</h2>
        
        <div id="guessing">       
            
            <div id="label-row" class="game-row">
                <div id="game-label" class="game-label">Country</div>
                <div id="i-label" class="game-label">Ideology</div>
                <div id="f-label" class="game-label">Factories</div>
                <div id="cont-label" class="game-label">Continent</div>
            </div>

            <div id="row0" class="game-row">
                <div id="c-0" class="game-box"></div>
                <div id="i-0" class="game-box"></div>
                <div id="f-0" class="game-box"></div>
                <div id="cont-0" class="game-box"></div>
            </div>

            <div id="row1" class="game-row">
                <div id="c-1" class="game-box"></div>
                <div id="i-1" class="game-box"></div>
                <div id="f-1" class="game-box"></div>
                <div id="cont-1" class="game-box"></div>
            </div>

            <div id="row2" class="game-row">
                <div id="c-2" class="game-box"></div>
                <div id="i-2" class="game-box"></div>
                <div id="f-2" class="game-box"></div>
                <div id="cont-2" class="game-box"></div>
            </div>

            <div id="row3" class="game-row">
                <div id="c-3" class="game-box"></div>
                <div id="i-3" class="game-box"></div>
                <div id="f-3" class="game-box"></div>
                <div id="cont-3" class="game-box"></div>
            </div>

            <div id="row4" class="game-row">
                <div id="c-4" class="game-box"></div>
                <div id="i-4" class="game-box"></div>
                <div id="f-4" class="game-box"></div>
                <div id="cont-4" class="game-box"></div>
            </div>

        </div>

        <div id="input-zone">
                
            <ul id="countries">
            </ul>
            <input type="text" id="input-bar" autocorrect="off" autocomplete="off" spellcheck="false" placeholder="Type in a country">

        </div>
        <img src="img\HOI4-Gamecard.jpg" class="bg-img" alt="HOI4 Gamecard">
    </div>


</body>
</html>
